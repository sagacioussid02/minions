name: Release

# On every git tag matching v*, build the wheel + sdist and attach them to the
# GitHub Release. Optionally publish to PyPI when PYPI_API_TOKEN is set as a
# repo secret (commented out below; uncomment after you've created the token
# at https://pypi.org/manage/account/token/).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to upload assets to the Release

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

      # ----- Uncomment after creating a PyPI API token -----
      #
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
