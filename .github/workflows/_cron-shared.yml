name: Minions cron (shared)

# Reusable workflow called by daily.yml / weekly.yml / friday.yml.
# Runs the requested ``minions`` subcommand against the Neon Postgres
# backend — all five stores (decisions, audit findings, engineer runs,
# cost log, activity log) read/write the database directly.

on:
  workflow_call:
    inputs:
      command:
        description: 'minions subcommand, e.g. "cron daily" or "cron weekly --no-dry-run".'
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      LANGFUSE_PUBLIC_KEY:
        required: false
      LANGFUSE_SECRET_KEY:
        required: false
      LANGFUSE_HOST:
        required: false
      MINIONS_SECRET_GMAIL_APP_PASSWORD:
        required: true
      MINIONS_GH_PAT:
        required: true
      MINIONS_DATABASE_URL:
        required: true

permissions:
  contents: read

jobs:
  run:
    # Public-mirror guard: set repo variable `MINIONS_DISABLE_CRON=true`
    # on the public demo mirror so scheduled runs no-op there (no real API
    # keys configured; would just burn Actions minutes). Manual
    # `workflow_dispatch` still runs (for demo walkthroughs). Forks/clones
    # don't set the variable, so their crons run normally.
    if: >-
      github.event_name == 'workflow_dispatch'
      || vars.MINIONS_DISABLE_CRON != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install minions
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run command
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          MINIONS_NOTIFIER: gmail
          MINIONS_SECRET_GMAIL_APP_PASSWORD: ${{ secrets.MINIONS_SECRET_GMAIL_APP_PASSWORD }}
          # Use the PAT for managed-project repo access. Workflow token is
          # scoped to this repo only.
          GITHUB_TOKEN: ${{ secrets.MINIONS_GH_PAT }}
          # All stores route through Neon when this is set. Required.
          MINIONS_DATABASE_URL: ${{ secrets.MINIONS_DATABASE_URL }}
        run: |
          echo "Running: minions ${{ inputs.command }}"
          {
            echo "## minions \`${{ inputs.command }}\`"
            echo ""
            echo "_Started $(date -u +%Y-%m-%dT%H:%M:%SZ)_"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          set -o pipefail
          minions ${{ inputs.command }} 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
