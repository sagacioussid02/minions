name: Weekly planning

# Monday 09:00 UTC. Real LLM run: profiles one project, runs the (grounded)
# planning crew, attaches a Devil's Advocate critique on risk>=medium
# proposals, and emails the operator a Decision via the approval pipeline.

on:
  schedule:
    # Budget mode: once a week (Monday). `--rotate` plans exactly one project
    # per run, cycling the portfolio by ISO week — so each project is planned
    # roughly once every N weeks. Caps both Actions minutes (one run/week) and
    # LLM spend (one project/run).
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without LLM calls / emails (default: false)'
        required: false
        type: boolean
        default: false
      project:
        description: 'Limit to a single project (omit to rotate one per week).'
        required: false
        type: string
        default: ''

concurrency:
  group: minions-cron
  cancel-in-progress: false

jobs:
  weekly:
    uses: ./.github/workflows/_cron-shared.yml
    with:
      command: >-
        ${{ inputs.dry-run
            && format('cron weekly{0}', inputs.project && format(' --project {0}', inputs.project) || ' --rotate')
            || format('cron weekly --no-dry-run{0}', inputs.project && format(' --project {0}', inputs.project) || ' --rotate') }}
    secrets: inherit
