name: Project planning scan

# On-demand project-specific planning scan. Each run invokes the planning crew
# for one project: Product Owner scouts value, Principal Engineer checks
# feasibility, and Manager packages the Decision.
#
# Budget mode: the scheduled weekday scans were removed — they duplicated the
# weekly planner and cost 5 runs/week. Sprint planning now runs once a week in
# weekly.yml (`--rotate`, one project per week). Use this workflow's manual
# trigger to scan a specific project on demand.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to scan'
        required: true
        type: choice
        options:
          - Demo
          - demo_five
          - demo_two
          - demo_four
          - demo_three
      dry-run:
        description: 'Run without LLM calls / emails (default: false)'
        required: false
        type: boolean
        default: false

concurrency:
  group: minions-cron
  cancel-in-progress: false

jobs:
  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_cron-shared.yml
    with:
      command: ${{ inputs.dry-run && format('cron weekly --project {0}', inputs.project) || format('cron weekly --no-dry-run --project {0}', inputs.project) }}
    secrets: inherit
