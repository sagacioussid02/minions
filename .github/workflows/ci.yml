name: CI

on:
  push:
    branches: [main]
  pull_request:
    # NOTE: pull_request runs in a sandboxed env. Repo secrets are NOT exposed
    # to PRs from forks — that's intentional and a security guarantee. Never
    # change this to pull_request_target without a thorough threat-model review.
    branches: [main]

# Default to least privilege. Override per-job if a step genuinely needs more.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests + lint + types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      # Mypy is strict-mode aspirational. ~30 known errors at the OSS launch
      # snapshot live in factory/store boundaries; tracked as `good first issue`.
      # Promote to blocking once the backlog clears.
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy src

      - name: Pytest
        run: pytest -q
