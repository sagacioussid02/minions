# Agent name registry — gives each role-per-project agent a human name.
#
# Phase 4 of openspec/sprint-tasks-memory. Names are persisted history;
# renaming an agent updates the display in new emissions but does NOT
# rewrite already-stored Decision / Task records (those keep the name
# they were stamped with at creation).
#
# Manage via:
#   minions agents name <agent_id> "<Display Name>"   # write
#   minions agents list                               # show all
#
# Agent IDs follow the pattern `role@project`. Shared roles (executive
# / specialist pool / audit) use `role@shared`.
#
# Seed names below — feel free to rename. Convention is short, memorable,
# distinct first names so the operator can talk about "Sasha shipped X"
# without ambiguity.

agents:
  # ---- Project pods (per project) ----
  product_owner@Demo:    "Aria"
  manager@Demo:          "Mira"
  tech_team_lead@Demo:   "Theo"
  # Engineer seat 0 (base) + seats 1..2 (suffix #1, #2). Multi-seat
  # round-robin lets the load-balancer assign tasks across Sasha, Vera,
  # Eli. Engineer seat count comes from `Manifest.team.engineers`.
  engineer@Demo:         "Sasha"
  engineer@Demo#1:       "Vera"
  engineer@Demo#2:       "Eli"

