
# Portfolio-level configuration for the minions org.
#
# Per-project manifests in `minions/projects/` reference this via
# `delivery_targets.scope: portfolio` and a `share_weight`. The orchestrator
# normalizes weights and allocates the portfolio-wide slots across projects.

delivery_cadence:
  option: A                       # A = portfolio-wide; B = per-project. See design.md "Delivery Cadence" section.
  features_per_week: 1            # 1 feature shipped per week across the portfolio
  bugs_per_week: 2.3              # ~1 bug every 2-3 days across the portfolio
  tech_debt_per_week: 1           # 1 tech-debt item retired per week across the portfolio
  scope: portfolio


# How the orchestrator allocates the portfolio's weekly slots across projects.
# Each project's manifest sets `delivery_targets.share_weight`; weights are normalized.
# The orchestrator picks each slot's recipient project stochastically by weight,
# but SKIPS projects whose discovery yields no real candidates (no fabrication).
allocation:
  policy: weighted_stochastic
  no_fabrication: true            # empty slot reported in Friday digest if no real backlog item exists
  carry_over: true                # unfilled slots roll into next week (capped at 2× weekly target)

budget_envelope:
  monthly_total_floor_usd: 15
  monthly_total_ceiling_usd: 30
  current_v0_target_usd: 14       # sum of active project monthly caps

# Cadence profile presets — projects may override via `cadence_profile` in their manifest.
cadence_profiles:
  v0_frugal:
    weekly_planning: monday_09_local
    weekly_digest: friday_16_local
    daily_monitoring: 09_local
    standups: disabled            # consolidated into weekly digest for v0
    on_demand: webhook
  v1_balanced:
    weekly_planning: monday_09_local
    weekly_digest: friday_16_local
    daily_monitoring: hourly
    standups: daily_09_local
    on_demand: webhook
  v2_full:
    weekly_planning: monday_09_local
    weekly_digest: friday_16_local
    daily_monitoring: hourly
    standups: daily_09_local
    on_demand: webhook_with_oncall

# ===== Audit & Challenge function =====
audit:
  enabled: true
  team:
    chief_auditor: sonnet
    process_auditor: haiku
    code_auditor: sonnet
    cost_auditor: haiku
    devils_advocate: sonnet
  reports_to: operator                       # not to executive layer; findings cannot be suppressed
  write_access: false                        # read-only by design
  sampling:
    pr_code_audit: 0.25                      # 25% of merged PRs sampled, risk-weighted
    pr_audit_risk_weighted: true             # Engineer/Intern PRs sampled more; Sr Eng less
    high_risk_decisions_devils_advocate: 1.0 # 100% — every risk≥medium decision
    procurement_cost_audit: 1.0
    team_composition_process_audit: 1.0
    sprint_process_audit_weekly: true
  monthly_budget_usd: 2.00

# ===== Dynamic team composition =====
team_composition:
  enabled: true
  default_headcount_limits:
    engineers: 8
    senior_engineers: 4
    qa: 3
    architects: 2
    total_team_size: 20
  allowed_new_roles:
    - qa_engineer
    - test_architect
    - performance_engineer
    - data_engineer
    - documentation_engineer
  cost_coupled_approval: true                # composition change + budget raise must be approved together when applicable

role_definitions:
  qa_engineer:
    tier: haiku
    tools: [test_runner, repo_read, pr_open, pr_comment]
  test_architect:
    tier: sonnet
    tools: [test_runner, repo_read, pr_open, pr_comment, design_doc_write]
  performance_engineer:
    tier: sonnet
    tools: [test_runner, repo_read, pr_open, pr_comment, profiler_read]
  data_engineer:
    tier: sonnet
    tools: [repo_read, pr_open, pr_comment, sql_read]
  documentation_engineer:
    tier: haiku
    tools: [repo_read, pr_open, pr_comment]

# ===== Procurement =====
procurement:
  enabled: true
  monthly_budget_usd: 0                      # opt in by raising — defaults to $0 so nothing buys until you say so
  delegated_signup_free_tier: false          # operator must enable explicitly after AWS Secrets Manager is provisioned
  delegated_card:
    enabled: false                           # operator must enable explicitly after Stripe Issuing card is provisioned
    monthly_cap_usd: 0
    provider: stripe_issuing                 # configured target; switch enabled=true once card exists
  email_alias_template: "operator+{vendor}@gmail.com"   # Gmail subaddressing
  secret_storage: aws_secrets_manager        # vendor credentials stored here, referenced by name only
  tos_acceptance_authorized: false           # MUST stay false by default; per-vendor authorization only
  quarterly_subscription_review: true

# Optional display names for shared layers. Same shape as per-project `agents:`.
# Multi-seat: provide a list (e.g., 2 Org Owners covering different project pairs).
named_agents:
