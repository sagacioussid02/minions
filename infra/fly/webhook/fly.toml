# fly.toml app configuration file generated for minions-webhook on 2026-05-07T13:47:39-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'minions-webhook'
primary_region = 'iad'

[build]
  # Path is relative to fly.toml's directory. Build context is set on the CLI:
  #   fly deploy . -c infra/fly/webhook/fly.toml
  # (the leading `.` makes the repo root the docker build context so src/ is included).
  dockerfile = 'Dockerfile'

[env]
  MINIONS_STORE_BACKEND = 'postgres'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
