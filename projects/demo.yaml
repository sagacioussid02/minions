name: Demo
description: A primary example project — replace this with your own.

source:
  kind: github
  path: ./demo
  repo: your-org/demo-app
  default_branch: main

weekly_budget_usd: 1.00
monthly_budget_usd: 4.00

cadence_profile: v0_frugal

delivery_targets:
  scope: portfolio
  share_weight: 0.3

team:
  intern: false
  engineers: 1

tier_overrides:
  principal: sonnet
  architect: sonnet
  default: haiku

auto_approve:
  - class: dep_patch_with_green_ci
    max_risk: low
  - class: docs_only
    max_risk: low
  - class: lint_format_fix
    max_risk: low

never_auto_approve:
  - class: secret_handling_change
  - class: auth_change
  - class: db_migration

approval_channels:
  email: true
  github_pr: true

# Site Sentry — synthetic uptime + TLS cert expiry monitoring.
# Point production_url at your deployed site; each health_checks path is
# probed on the Site Sentry cadence and its status/latency/cert-expiry
# lands on the operator console's Sentry page.
deploy:
  target: generic
  production_url: https://example.com
  health_checks:
    - path: /
      expect_status: 200

# Renewal radar — dated obligations Site Sentry watches. Dates ONLY; the
# agents never read the secret values themselves. Amber <=30d, red <=7d /
# overdue; upcoming ones also roll into the Friday digest.
renewals:
  - name: Vercel Pro
    due: 2026-07-26
    url: https://vercel.com/account/plans
    note: annual subscription
secret_rotations:
  - name: ANTHROPIC_API_KEY
    due: 2026-07-10
    note: rotate quarterly

# Optional display names — uncomment to personalize this project's crew.
agents:
  # product_owner: Tara
  # manager: Marcus
  # principal_engineer: Priya
  # tech_team_lead: Theo
  # senior_engineer:
  #   - Sasha
  #   - Sven
  # engineer:
  #   - Eli

owner: you@example.com
