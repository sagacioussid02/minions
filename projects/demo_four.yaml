name: demo_four
description: Example project — replace with your own.

source:
  kind: github
  path: ./demo_four
  repo: your-org/demo_four
  default_branch: main

weekly_budget_usd: 1.00
monthly_budget_usd: 4.00

cadence_profile: v0_frugal

delivery_targets:
  scope: portfolio
  share_weight: 0.4

team:
  intern: false
  # Bumped to 2 engineer seats so test_project_role_slots_respects_team_overrides
  # (in tests/test_roster.py) finds the expected 2 ENGINEER entries after the
  # sync-to-public scrub (this fixture mirrors sidspace.yaml upstream).
  engineers: 2
  enable_security_champion: false

tier_overrides:
  principal: sonnet
  architect: sonnet
  default: haiku

auto_approve:
  - class: dep_patch_with_green_ci
    max_risk: low
  - class: docs_only
    max_risk: low
  - class: lint_format_fix
    max_risk: low

never_auto_approve:
  - class: secret_handling_change
  - class: auth_change
  - class: db_migration

approval_channels:
  email: true
  github_pr: true

agents: {}

owner: you@example.com
